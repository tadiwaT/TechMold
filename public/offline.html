<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TechMold POS — Offline</title>
  <style>
    :root {
      --bg: #080c10;
      --card: #1a2029;
      --border: rgba(255,255,255,0.08);
      --neon: #00D4FF;
      --text: #f0f6fc;
      --muted: #8b949e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    .icon-wrap {
      width: 72px;
      height: 72px;
      border-radius: 20px;
      background: linear-gradient(135deg, rgba(0,212,255,0.15), rgba(99,102,241,0.15));
      border: 1px solid rgba(0,212,255,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #00D4FF, #6366f1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    p { color: var(--muted); font-size: 14px; line-height: 1.6; margin-bottom: 8px; }
    .status {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin: 24px 0;
      padding: 12px 20px;
      border-radius: 12px;
      background: rgba(248,81,73,0.1);
      border: 1px solid rgba(248,81,73,0.2);
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #f85149;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .status-text { font-size: 13px; color: #f85149; font-weight: 500; }
    .queue-info {
      background: rgba(0,212,255,0.08);
      border: 1px solid rgba(0,212,255,0.2);
      border-radius: 12px;
      padding: 16px;
      margin: 16px 0;
    }
    .queue-info p { color: var(--neon); font-size: 13px; }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, #00D4FF, #0ea5e9);
      color: #080c10;
      border: none;
      border-radius: 12px;
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 20px;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-secondary {
      background: var(--card);
      color: var(--muted);
      border: 1px solid var(--border);
      margin-left: 8px;
    }
    .divider { border: none; border-top: 1px solid var(--border); margin: 24px 0; }
    .cached-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 12px;
    }
    .page-links { display: flex; flex-direction: column; gap: 8px; }
    .page-link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 10px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      color: var(--text);
      text-decoration: none;
      font-size: 13px;
      transition: all 0.15s;
    }
    .page-link:hover { border-color: rgba(0,212,255,0.3); background: rgba(0,212,255,0.05); }
    .page-link span { font-size: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-wrap">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#00D4FF" stroke-width="1.8" stroke-linecap="round">
        <line x1="1" y1="1" x2="23" y2="23"/>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <line x1="12" y1="20" x2="12.01" y2="20"/>
      </svg>
    </div>

    <h1>You&apos;re Offline</h1>
    <p>No internet connection detected. Don&apos;t worry — TechMold POS keeps working.</p>

    <div class="status">
      <div class="dot"></div>
      <span class="status-text">No Internet Connection</span>
    </div>

    <div class="queue-info">
      <p id="queue-msg">✓ Sales made offline are queued and will sync automatically when you reconnect.</p>
    </div>

    <hr class="divider" />

    <div class="cached-label">Cached Pages Available Offline</div>
    <div class="page-links">
      <a href="/dashboard/pos" class="page-link"><span>🖥️</span> POS Terminal</a>
      <a href="/dashboard/inventory" class="page-link"><span>📦</span> Inventory</a>
      <a href="/dashboard/customers" class="page-link"><span>👥</span> Customers</a>
      <a href="/dashboard/reports" class="page-link"><span>📊</span> Reports</a>
    </div>

    <div style="margin-top:24px">
      <button class="btn" onclick="location.reload()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
        Try Reconnecting
      </button>
    </div>
  </div>

  <script>
    // Auto-detect when back online
    window.addEventListener('online', () => {
      document.querySelector('.dot').style.background = '#3fb950'
      document.querySelector('.status-text').textContent = 'Back online! Syncing...'
      document.querySelector('.status').style.background = 'rgba(63,185,80,0.1)'
      document.querySelector('.status').style.borderColor = 'rgba(63,185,80,0.3)'
      setTimeout(() => { window.location.href = '/dashboard/pos' }, 1500)
    })

    // Check queue count from SW
    if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
      const channel = new MessageChannel()
      navigator.serviceWorker.controller.postMessage({ type: 'GET_QUEUE_COUNT' }, [channel.port2])
      channel.port1.onmessage = (e) => {
        const count = e.data?.count || 0
        if (count > 0) {
          document.getElementById('queue-msg').textContent =
            `⏳ ${count} sale${count > 1 ? 's' : ''} queued offline — will sync when reconnected.`
        }
      }
    }
  </script>
</body>
</html>
