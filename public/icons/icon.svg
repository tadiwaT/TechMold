<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080c10;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" fill="url(#bg2)"/>

  <!-- Outer glow ring -->
  <rect x="24" y="24" width="464" height="464" rx="80" fill="none" stroke="url(#bg)" stroke-width="3" opacity="0.4"/>

  <!-- Monitor screen -->
  <rect x="96" y="120" width="320" height="200" rx="16" fill="none" stroke="url(#bg)" stroke-width="16"/>

  <!-- Screen inner content lines -->
  <line x1="136" y1="168" x2="280" y2="168" stroke="#00D4FF" stroke-width="10" stroke-linecap="round" opacity="0.9"/>
  <line x1="136" y1="200" x2="240" y2="200" stroke="#6366f1" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
  <line x1="136" y1="228" x2="260" y2="228" stroke="#6366f1" stroke-width="8" stroke-linecap="round" opacity="0.5"/>

  <!-- Cart icon in screen -->
  <circle cx="340" cy="210" r="36" fill="url(#bg)" opacity="0.15"/>
  <path d="M318 192h8l10 32h20l6-22h-28" stroke="#00D4FF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <circle cx="336" cy="228" r="5" fill="#00D4FF"/>
  <circle cx="356" cy="228" r="5" fill="#00D4FF"/>

  <!-- Stand -->
  <line x1="256" y1="320" x2="256" y2="368" stroke="url(#bg)" stroke-width="16" stroke-linecap="round"/>
  <rect x="180" y="368" width="152" height="20" rx="10" fill="url(#bg)"/>

  <!-- Wifi / signal dots (offline indicator area) -->
  <circle cx="400" cy="380" r="8" fill="#00D4FF" opacity="0.9"/>
  <circle cx="424" cy="380" r="6" fill="#6366f1" opacity="0.6"/>
  <circle cx="444" cy="380" r="5" fill="#6366f1" opacity="0.3"/>
</svg>
